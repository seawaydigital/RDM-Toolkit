version: 2
updates:
  # Low-touch cadence (2026-07-18): monthly, grouped into a single PR per
  # ecosystem. Security-fix PRs are NOT affected by this schedule — Dependabot
  # opens those as soon as an advisory with a fix lands, which is exactly the
  # signal we want. Routine version bumps wait for the monthly batch.
  #
  # Reminder: any npm bump must also update the exact-version allowlist in
  # scripts/security-audit.mjs (same PR) or the `security` check fails.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      npm-monthly:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "security"
    ignore:
      # Only auto-update patch and minor; major version bumps need manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      actions-monthly:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
