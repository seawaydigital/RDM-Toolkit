version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    ignore:
      # Only auto-update patch and minor; major version bumps need manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Keep pinned Actions SHAs current — Dependabot rewrites the SHA and
  # updates the trailing `# vX.Y.Z` comment on every release.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
